<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrift Flip Calculator</title>
<style>
body{font-family:Arial,sans-serif;background:#667eea;padding:20px;max-width:400px;margin:0 auto}
.container{background:white;padding:20px;border-radius:15px}
h1{text-align:center;color:#333;font-size:24px}
.input-group{margin-bottom:15px}
label{display:block;margin-bottom:5px;color:#555;font-weight:bold}
input,select{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:16px}
.results{background:#667eea;color:white;padding:20px;border-radius:10px;margin-top:20px}
.result-row{display:flex;justify-content:space-between;margin-bottom:10px}
.profit{font-size:20px;font-weight:bold;border-top:2px solid rgba(255,255,255,0.3);padding-top:10px}
.positive{color:#90EE90}.negative{color:#FFB6C1}
</style>
</head>
<body>
<div class="container">
<h1>🛒 Thrift Flip Calc</h1>
<div class="input-group">
<label>Item Cost ($)</label>
<input type="number" id="cost" placeholder="5" oninput="calc()">
</div>
<div class="input-group">
<label>Selling Price ($)</label>
<input type="number" id="price" placeholder="45" oninput="calc()">
</div>
<div class="input-group">
<label>Platform</label>
<select id="platform" onchange="calc()">
<option value="ebay">eBay (13% + 2.9%)</option>
<option value="fb">Facebook (5% + 2.9%)</option>
<option value="etsy">Etsy (6.5% + 3%)</option>
<option value="posh">Poshmark (20%)</option>
</select>
</div>
<div class="input-group">
<label>Shipping ($)</label>
<input type="number" id="ship" placeholder="0" oninput="calc()">
</div>
<div class="results">
<div class="result-row"><span>Revenue:</span><span id="rev">$0</span></div>
<div class="result-row"><span>Fees:</span><span id="fees">-$0</span></div>
<div class="result-row"><span>Costs:</span><span id="costs">-$0</span></div>
<div class="result-row profit"><span>PROFIT:</span><span id="profit">$0</span></div>
</div>
</div>
<script>
const rates={ebay:[0.13,0.029,0.30],fb:[0.05,0.029,0.30],etsy:[0.065,0.03,0.25],posh:[0.20,0,0]};
function calc(){
const c=parseFloat(document.getElementById('cost').value)||0;
const p=parseFloat(document.getElementById('price').value)||0;
const s=parseFloat(document.getElementById('ship').value)||0;
const r=rates[document.getElementById('platform').value];
const f=p*r[0]+p*r[1]+r[2];
const profit=p-f-s-c;
document.getElementById('rev').textContent='$'+p.toFixed(2);
document.getElementById('fees').textContent='-$'+f.toFixed(2);
document.getElementById('costs').textContent='-$'+(s+c).toFixed(2);
const el=document.getElementById('profit');
el.textContent='$'+profit.toFixed(2);
el.className=profit>=0?'positive':'negative';
}
calc();
</script>
</body>
</html>
