<svg width="300" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Door hanger outline -->
  <rect x="10" y="10" width="280" height="430" rx="20" ry="20" 
        fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Hook hole at top -->
  <circle cx="150" cy="50" r="25" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- WELCOME text -->
  <text x="150" y="200" font-family="Arial, sans-serif" font-size="48" 
        font-weight="bold" text-anchor="middle" fill="none" stroke="black" stroke-width="1.5">
    WELCOME
  </text>
  
  <!-- Decorative line -->
  <line x1="50" y1="240" x2="250" y2="240" stroke="black" stroke-width="2"/>
  
  <!-- Bottom accent: simple mountain silhouette -->
  <polygon points="50,380 100,280 150,340 200,260 250,380" 
           fill="none" stroke="black" stroke-width="2"/>
</svg>